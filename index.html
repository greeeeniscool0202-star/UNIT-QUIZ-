<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Horizon 1 文法クイズ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:linear-gradient(160deg,#e0f0ff 0%,#c7e2ff 50%,#ddf0ff 100%);min-height:100vh;color:#1a3558;}
#app{max-width:680px;margin:0 auto;padding:1rem 1rem 3rem;}

.hidden{display:none!important;}

/* ── TOP ── */
.top-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;text-align:center;}
.top-logo{margin-bottom:2rem;}
.top-logo h1{font-size:28px;font-weight:800;color:#1e40af;letter-spacing:.5px;}
.top-logo p{font-size:14px;color:#60a5fa;margin-top:6px;}
.ready-box{background:rgba(255,255,255,0.85);border-radius:24px;padding:2.5rem 2rem;border:1px solid rgba(147,197,253,0.5);box-shadow:0 8px 32px rgba(59,130,246,0.15);margin-bottom:2rem;width:100%;}
.ready-text{font-size:32px;font-weight:800;color:#1e40af;margin-bottom:.5rem;letter-spacing:1px;}
.ready-sub{font-size:14px;color:#60a5fa;}
.ok-btn{width:100%;padding:1.25rem;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;border-radius:16px;color:#fff;font-size:24px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(37,99,235,0.4);letter-spacing:2px;transition:transform .1s,opacity .1s;}
.ok-btn:hover{opacity:.92;}
.ok-btn:active{transform:scale(.97);}
.top-info{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;}
.ti{background:rgba(255,255,255,0.75);border-radius:12px;padding:.75rem;text-align:center;border:1px solid #bfdbfe;}
.ti .tiv{font-size:22px;font-weight:800;color:#2563eb;}
.ti .til{font-size:11px;color:#60a5fa;margin-top:2px;}

/* ── QUIZ ── */
.q-header{background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:16px;padding:1.1rem 1.4rem;margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 14px rgba(37,99,235,.25);}
.qh-left{font-size:16px;font-weight:700;color:#fff;}
.qh-right{font-size:13px;color:rgba(255,255,255,.8);}
.score-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.9rem;}
.sc{background:rgba(255,255,255,.78);border-radius:10px;padding:.55rem;text-align:center;border:1px solid #bfdbfe;}
.sc .sl{font-size:11px;color:#3b82f6;margin-bottom:2px;}
.sc .sv{font-size:17px;font-weight:700;color:#1e40af;}
.q-box{background:linear-gradient(135deg,#1e40af,#1e3a8a);border-radius:16px;padding:1.4rem;margin-bottom:.9rem;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(30,64,175,.2);}
.q-tag{display:inline-block;background:rgba(255,255,255,.18);border-radius:6px;padding:2px 10px;font-size:11px;color:#bfdbfe;margin-bottom:7px;}
.q-text{font-size:15px;font-weight:600;text-align:center;line-height:1.7;color:#fff;}
.timer-bar{height:6px;background:rgba(255,255,255,.18);border-radius:3px;margin-top:.9rem;width:100%;overflow:hidden;}
.timer-fill{height:100%;background:#fff;border-radius:3px;transition:width .1s linear;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:.9rem;}
.opt{border:none;border-radius:12px;padding:.9rem .7rem;font-size:13px;font-weight:600;cursor:pointer;text-align:left;line-height:1.5;color:#fff;transition:transform .1s;}
.opt:active{transform:scale(.97);}
.opt.c0{background:#e53e3e;}
.opt.c1{background:#2563eb;}
.opt.c2{background:#d97706;}
.opt.c3{background:#16a34a;}
.opt.correct{outline:4px solid #1e40af;outline-offset:2px;}
.opt.wrong{opacity:.32;}
.opt:disabled{cursor:default;}
.fb{border-radius:12px;padding:.8rem 1rem;font-size:15px;font-weight:700;text-align:center;margin-bottom:.9rem;}
.fb-ok{background:#16a34a;color:#fff;}
.fb-ng{background:#e53e3e;color:#fff;}
.fb-to{background:#6b7280;color:#fff;}
.fb-answer{font-size:12px;font-weight:500;margin-top:4px;opacity:.9;}
.btn-next{width:100%;padding:.9rem;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.3);}
.btn-next:hover{opacity:.92;}

/* ── RESULT ── */
.result-top{text-align:center;padding:1.5rem 0 1rem;}
.big-score{font-size:58px;font-weight:800;color:#2563eb;line-height:1;}
.score-label{font-size:14px;color:#60a5fa;margin-top:4px;}
.result-msg{font-size:20px;font-weight:700;color:#1e40af;margin-top:.75rem;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem;}
.stat{background:rgba(255,255,255,.78);border-radius:12px;padding:.75rem;text-align:center;border:1px solid #bfdbfe;}
.stat .stv{font-size:22px;font-weight:800;color:#2563eb;}
.stat .stl{font-size:11px;color:#60a5fa;margin-top:2px;}
.wrong-list{background:rgba(255,255,255,.78);border-radius:12px;overflow:hidden;border:1px solid #fca5a5;margin-bottom:1.25rem;}
.wl-header{background:#fee2e2;padding:.6rem 1rem;font-size:13px;font-weight:700;color:#dc2626;}
.wl-row{padding:.6rem 1rem;border-bottom:1px solid #fecaca;font-size:13px;color:#1a3558;line-height:1.6;}
.wl-row:last-child{border-bottom:none;}
.wl-unit{font-size:11px;color:#f87171;font-weight:600;margin-bottom:2px;}
.btn-primary{width:100%;padding:.9rem;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.3);margin-bottom:.75rem;}
.btn-primary:hover{opacity:.92;}
.btn-sec{width:100%;padding:.85rem;background:rgba(255,255,255,.85);border:2px solid #93c5fd;border-radius:12px;color:#1d4ed8;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:.75rem;}
.btn-sec:hover{background:rgba(219,234,254,.8);}
.btn-warn{width:100%;padding:.85rem;background:rgba(255,255,255,.85);border:2px solid #fca5a5;border-radius:12px;color:#dc2626;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:.75rem;}
.btn-warn:hover{background:rgba(254,226,226,.8);}
.btn-warn:disabled{opacity:.35;cursor:default;}
</style>
</head>
<body>
<div id="app">

  <!-- ① TOP -->
  <div id="screen-top" class="top-screen">
    <div class="top-logo">
      <h1>🎮 NH1 文法クイズ</h1>
      <p>New Horizon 1 ／ Unit 1〜3</p>
    </div>
    <div class="ready-box">
      <div class="ready-text">Are you ready?</div>
      <div class="ready-sub">Unit 1〜3の文法・単語・並び替え</div>
    </div>
    <button class="ok-btn" onclick="startGame(null)">OK</button>
    <br>
    <div class="top-info">
      <div class="ti"><div class="tiv">30</div><div class="til">総問題数</div></div>
      <div class="ti"><div class="tiv">10</div><div class="til">出題数</div></div>
      <div class="ti"><div class="tiv">20s</div><div class="til">制限時間</div></div>
    </div>
  </div>

  <!-- ② QUIZ -->
  <div id="screen-quiz" class="hidden">
    <div class="q-header">
      <span class="qh-left">NH1 文法クイズ</span>
      <span class="qh-right" id="qh-counter"></span>
    </div>
    <div class="score-row">
      <div class="sc"><div class="sl">スコア</div><div class="sv" id="q-score">0</div></div>
      <div class="sc"><div class="sl">連続正解</div><div class="sv" id="q-streak">0</div></div>
      <div class="sc"><div class="sl">残り時間</div><div class="sv" id="q-timer">20</div></div>
    </div>
    <div class="q-box">
      <div class="q-tag" id="q-tag"></div>
      <div class="q-text" id="q-text"></div>
      <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
    </div>
    <div class="opts" id="opts"></div>
    <div id="fb" class="fb hidden"></div>
    <button id="next-btn" class="btn-next hidden" onclick="nextQ()">次の問題へ →</button>
  </div>

  <!-- ③ RESULT -->
  <div id="screen-result" class="hidden">
    <div class="result-top">
      <div class="big-score" id="res-score"></div>
      <div class="score-label">ポイント</div>
      <div class="result-msg" id="res-msg"></div>
    </div>
    <div class="stats-grid">
      <div class="stat"><div class="stv" id="res-correct"></div><div class="stl">正解数</div></div>
      <div class="stat"><div class="stv" id="res-wrong-count"></div><div class="stl">不正解数</div></div>
      <div class="stat"><div class="stv" id="res-streak"></div><div class="stl">最大連続正解</div></div>
    </div>
    <div id="wrong-section">
      <div class="wrong-list" id="wrong-list"></div>
    </div>
    <br>
    <button class="btn-primary" onclick="startGame(null)">🔀 もう一度やる（新しい10問）</button>
    <button class="btn-sec" onclick="startGame('same')">📚 同じ問題をやる</button>
    <button class="btn-warn" id="retry-wrong-btn" onclick="startGame('wrong')">❌ 間違えた問題をやる</button>
  </div>

</div>
<script>
const BANK = [
  {u:'Unit 1',t:'単語',q:'"name" の意味は？',o:['名前','年齢','国','学校'],a:0},
  {u:'Unit 1',t:'単語',q:'"friend" の意味は？',o:['友達','家族','先生','兄弟'],a:0},
  {u:'Unit 1',t:'単語',q:'"favorite" の意味は？',o:['お気に入りの','有名な','新しい','大きい'],a:0},
  {u:'Unit 1',t:'単語',q:'"like" の意味は？',o:['〜が好きだ','〜を知っている','〜を持っている','〜を見る'],a:0},
  {u:'Unit 1',t:'単語',q:'"from" の意味は？',o:['〜出身の・〜から','〜のために','〜と一緒に','〜の中に'],a:0},
  {u:'Unit 1',t:'文法',q:'"I ___ Ken." に入る語は？',o:['am','is','are','be'],a:0},
  {u:'Unit 1',t:'文法',q:'"This ___ my bag." に入る語は？',o:['is','am','are','be'],a:0},
  {u:'Unit 1',t:'文法',q:'"I\'m" は何の短縮形？',o:['I am','I is','I are','I be'],a:0},
  {u:'Unit 1',t:'文法',q:'"Do you like soccer?" への正しい答えは？',o:['Yes, I do.','Yes, I am.','Yes, I like.','Yes, I does.'],a:0},
  {u:'Unit 1',t:'文法',q:'"I like music." の否定文は？',o:["I don't like music.",'I not like music.','I am not like music.',"I doesn't like music."],a:0},
  {u:'Unit 1',t:'並び替え',q:'「私はサッカーが好きです。」→ 正しい語順は？',o:['I like soccer.','Like I soccer.','I soccer like.','Soccer like I.'],a:0},
  {u:'Unit 1',t:'並び替え',q:'「あなたは野球が好きですか？」→ 正しい語順は？',o:['Do you like baseball?','You like baseball?','Are you like baseball?','Like you baseball?'],a:0},
  {u:'Unit 1',t:'並び替え',q:'「私は東京出身です。」→ 正しい語順は？',o:["I'm from Tokyo.",'I from Tokyo am.',"From Tokyo I'm.","Tokyo I'm from."],a:0},
  {u:'Unit 2',t:'単語',q:'"always" の意味は？',o:['いつも','ときどき','決して〜しない','たいてい'],a:0},
  {u:'Unit 2',t:'単語',q:'"usually" の意味は？',o:['たいてい','いつも','ときどき','決して〜しない'],a:0},
  {u:'Unit 2',t:'単語',q:'"sometimes" の意味は？',o:['ときどき','いつも','たいてい','決して〜しない'],a:0},
  {u:'Unit 2',t:'単語',q:'"never" の意味は？',o:['決して〜しない','いつも','ときどき','たいてい'],a:0},
  {u:'Unit 2',t:'文法',q:'"He ___ soccer." に入る語は？（「彼はサッカーが好きです。」）',o:['likes','like','is like','do like'],a:0},
  {u:'Unit 2',t:'文法',q:'"Does he like math?" への正しい答えは？',o:['Yes, he does.','Yes, he do.','Yes, he is.','Yes, he likes.'],a:0},
  {u:'Unit 2',t:'文法',q:'三人称単数現在形のとき、動詞に何をつける？',o:['s または es','ing','ed','何もつけない'],a:0},
  {u:'Unit 2',t:'文法',q:'"study" の三人称単数現在形は？',o:['studies','studys','studying','studied'],a:0},
  {u:'Unit 2',t:'文法',q:'"have" の三人称単数現在形は？',o:['has','haves','having','had'],a:0},
  {u:'Unit 2',t:'並び替え',q:'「彼は音楽が好きです。」→ 正しい語順は？',o:['He likes music.','He like music.','He music likes.','Likes he music.'],a:0},
  {u:'Unit 2',t:'並び替え',q:'「ケンは数学が好きではありません。」→ 正しい語順は？',o:["Ken doesn't like math.","Ken don't like math.",'Ken not likes math.',"Ken isn't like math."],a:0},
  {u:'Unit 3',t:'単語',q:'"can" の意味は？',o:['〜できる','〜したい','〜しなければならない','〜してもよい'],a:0},
  {u:'Unit 3',t:'単語',q:'"join" の意味は？',o:['〜に入る・参加する','〜を始める','〜をやめる','〜を楽しむ'],a:0},
  {u:'Unit 3',t:'単語',q:'"practice" の意味は？',o:['練習する','勉強する','遊ぶ','走る'],a:0},
  {u:'Unit 3',t:'文法',q:'"I ___ play the piano." に入る語は？（「私はピアノが弾けます。」）',o:['can','am','do','is'],a:0},
  {u:'Unit 3',t:'文法',q:'"Can you swim?" への正しい答えは？',o:['Yes, I can.','Yes, I do.','Yes, I am.','Yes, I swim.'],a:0},
  {u:'Unit 3',t:'文法',q:'"can" のあとの動詞の形は？',o:['動詞の原形','動詞にsをつける','動詞にingをつける','動詞にedをつける'],a:0},
];

const SHAPES = ['▲','◆','●','■'];
const Q_COUNT = 10;

let myScore=0, myStreak=0, myMaxStreak=0, myCorrect=0, myQIdx=0;
let myQuestions=[], wrongBank=[], lastBank=[];
let answered=false, timerInterval=null, timeLeft=20;

function show(id){
  ['screen-top','screen-quiz','screen-result'].forEach(s=>{
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function prepare(pool){
  return pool.map(q=>{
    const idx=shuffle([0,1,2,3]);
    return{...q,do:idx.map(i=>q.o[i]),ca:idx.indexOf(q.a)};
  });
}

function startGame(mode){
  myScore=0; myStreak=0; myMaxStreak=0;
  myCorrect=0; myQIdx=0; wrongBank=[];
  answered=false; clearInterval(timerInterval);

  if(mode==='wrong'){
    const pool=lastBank.filter(q=>wrongBank.find(w=>w.q===q.q)) || lastBank;
    myQuestions=prepare(shuffle(pool.length>0?pool:lastBank).slice(0,Q_COUNT));
  } else if(mode==='same'){
    myQuestions=prepare(lastBank);
  } else {
    lastBank=shuffle(BANK).slice(0,Q_COUNT);
    myQuestions=prepare(lastBank);
  }

  show('screen-quiz');
  renderQ();
}

function renderQ(){
  answered=false; timeLeft=20;
  const q=myQuestions[myQIdx];
  document.getElementById('qh-counter').textContent='Q'+(myQIdx+1)+' / '+myQuestions.length;
  document.getElementById('q-score').textContent=myScore.toLocaleString();
  document.getElementById('q-streak').textContent=myStreak;
  document.getElementById('q-timer').textContent=20;
  document.getElementById('q-tag').textContent=q.u+' ／ '+q.t;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('timer-fill').style.width='100%';
  document.getElementById('fb').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');

  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.do.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt c'+i;
    btn.innerHTML='<span>'+SHAPES[i]+'</span> '+opt;
    btn.onclick=()=>selectAns(i);
    opts.appendChild(btn);
  });
  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);
  const fill=document.getElementById('timer-fill');
  const val=document.getElementById('q-timer');
  timerInterval=setInterval(()=>{
    timeLeft-=0.1;
    const pct=Math.max(0,(timeLeft/20)*100);
    if(fill) fill.style.width=pct+'%';
    if(val) val.textContent=Math.ceil(Math.max(0,timeLeft));
    if(timeLeft<=0){clearInterval(timerInterval);if(!answered)timeUp();}
  },100);
}

function timeUp(){
  answered=true;
  const q=myQuestions[myQIdx];
  document.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.ca) b.classList.add('correct'); else b.classList.add('wrong');
  });
  myStreak=0;
  document.getElementById('q-streak').textContent=0;
  wrongBank.push(BANK.find(b=>b.q===q.q)||q);
  showFb('時間切れ！','fb-to','正解：'+q.do[q.ca]);
}

function selectAns(idx){
  if(answered) return;
  answered=true; clearInterval(timerInterval);
  const q=myQuestions[myQIdx];
  document.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.ca) b.classList.add('correct'); else b.classList.add('wrong');
  });
  if(idx===q.ca){
    const bonus=Math.round((timeLeft/20)*1000);
    myScore+=bonus; myStreak++; myCorrect++;
    if(myStreak>myMaxStreak) myMaxStreak=myStreak;
    document.getElementById('q-score').textContent=myScore.toLocaleString();
    document.getElementById('q-streak').textContent=myStreak;
    showFb(myStreak>=3?'正解！ '+myStreak+'連続！':'正解！','fb-ok','');
  } else {
    myStreak=0;
    document.getElementById('q-streak').textContent=0;
    wrongBank.push(BANK.find(b=>b.q===q.q)||q);
    showFb('不正解...','fb-ng','正解：'+q.do[q.ca]);
  }
}

function showFb(msg,cls,sub){
  const fb=document.getElementById('fb');
  fb.className='fb '+cls;
  fb.innerHTML=msg+(sub?'<div class="fb-answer">'+sub+'</div>':'');
  fb.classList.remove('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
}

function nextQ(){
  myQIdx++;
  if(myQIdx>=myQuestions.length) showResult();
  else renderQ();
}

function showResult(){
  clearInterval(timerInterval);
  const wrongCount=myQuestions.length-myCorrect;
  const msg=myCorrect>=10?'🏆 パーフェクト！':
             myCorrect>=8?'🌟 すばらしい！':
             myCorrect>=6?'👍 よくできました！':'💪 もう一度チャレンジ！';

  document.getElementById('res-score').textContent=myScore.toLocaleString();
  document.getElementById('res-msg').textContent=msg;
  document.getElementById('res-correct').textContent=myCorrect;
  document.getElementById('res-wrong-count').textContent=wrongCount;
  document.getElementById('res-streak').textContent=myMaxStreak;

  const wl=document.getElementById('wrong-list');
  const retryBtn=document.getElementById('retry-wrong-btn');
  if(wrongBank.length>0){
    wl.innerHTML='<div class="wl-header">❌ 間違えた問題（'+wrongBank.length+'問）</div>'+
      wrongBank.map(q=>'<div class="wl-row"><div class="wl-unit">'+q.u+' ／ '+q.t+'</div>'+q.q+'<br><strong>正解：'+q.o[q.a]+'</strong></div>').join('');
    document.getElementById('wrong-section').style.display='';
    retryBtn.disabled=false;
  } else {
    document.getElementById('wrong-section').style.display='none';
    retryBtn.disabled=true;
  }
  show('screen-result');
}
</script>
</body>
</html>
